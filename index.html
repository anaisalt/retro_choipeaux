<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le ChoixPro Magique</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; color: #eee; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 16px; padding: 2rem 2.5rem; max-width: 620px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .progress-bar { height: 4px; background: #0f3460; border-radius: 2px; margin-bottom: 2rem; }
    .progress-fill { height: 4px; background: #e2c97e; border-radius: 2px; transition: width 0.4s ease; }
    .q-num { font-size: 13px; color: #8899aa; margin-bottom: 0.5rem; }
    .q-text { font-size: 17px; font-weight: 500; color: #eee; margin-bottom: 1.5rem; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt { padding: 13px 16px; border: 1px solid #0f3460; border-radius: 10px; cursor: pointer; font-size: 15px; color: #ccd6f6; background: #0d1b2a; transition: background 0.15s, border-color 0.15s; text-align: left; line-height: 1.4; }
    .opt:hover { background: #0f3460; border-color: #e2c97e55; }
    .opt.selected { border-color: #e2c97e; background: #1a2a1a; color: #e2c97e; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
    .btn-sec { font-size: 14px; color: #8899aa; background: none; border: 1px solid #0f3460; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
    .btn-sec:hover { border-color: #8899aa; color: #eee; }
    .btn-pri { padding: 11px 22px; background: #e2c97e; color: #1a1a2e; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-pri:hover { opacity: 0.88; }
    .result-wrap { text-align: center; padding: 1rem 0; }
    .house-emoji { font-size: 64px; margin-bottom: 0.75rem; }
    .house-name { font-size: 28px; font-weight: 700; color: #e2c97e; margin-bottom: 0.25rem; }
    .house-tagline { font-size: 15px; color: #8899aa; margin-bottom: 1.5rem; font-style: italic; }
    .house-desc { font-size: 15px; color: #ccd6f6; line-height: 1.75; text-align: left; background: #0d1b2a; padding: 1rem 1.25rem; border-radius: 12px; border: 1px solid #0f3460; margin-bottom: 1.25rem; }
    .scores-detail { font-size: 13px; color: #556677; margin-bottom: 1.5rem; }
    .intro { text-align: center; }
    .hat-big { font-size: 56px; margin-bottom: 1rem; }
    .intro p { font-size: 15px; color: #8899aa; line-height: 1.7; margin-bottom: 2rem; }
  </style>
</head>
<body>
<div class="card">
  <div id="area"></div>
</div>
<script>
const questions = [
  {
    text: "Une réunion démarre sans ordre du jour. Ta réaction ?",
    opts: [
      { text: "Je m'assure que le sujet est globalement bien compris et m'adapte", scores: { P: 2, G: 1 } },
      { text: "Je retiens pour les prochaines fois que c'est un problème à régler sur le fond", scores: { Sl: 2, Se: 1 } },
      { text: "Ça me va, parfois les meilleures discussions sont non planifiées", scores: { G: 2, P: 1 } },
      { text: "Je propose d'en définir un avant de commencer", scores: { Se: 2, Sl: 1 } }
    ]
  },
  {
    text: "Quand tu apprends une nouvelle formule magique",
    opts: [
      { text: "Tu veux bien comprendre comment ça marche d’abord", scores: { Se: 2, P: 1 } },
      { text: "Tu préfères apprendre avec quelqu’un", scores: { P: 2, G: 1 } },
      { text: "Tu cherches comment l'utiliser concrètement", scores: { Sl: 2, Se: 1 } },
      { text: "Tu la testes directement", scores: { G: 2, Sl: 1 } }
    ]
  },
  {
    text: "Une décision est prise collectivement avec laquelle tu n'es pas d'accord. Tu fais quoi ?",
    opts: [
      { text: "Ça te va si la majorité est ok, mais tu notes pour la prochaine rétro", scores: { P: 2, G: 1 } },
      { text: "Tu le dis en direct en réunion", scores: { G: 2, Se: 1 } },
      { text: "Tu en parles en off pour évaluer si c'est un sentiment partagé", scores: { Sl: 2, P: 1 } },
      { text: "Tu demandes qu'on en rediscute et prépares ta réflexion", scores: { Se: 2, Sl: 1 } }
    ]
  },
  {
    text: "Dans une dispute, tu…",
    opts: [
      { text: "Essaies surtout d’éviter que ça dégénère", scores: { P: 2, G: 1 } },
      { text: "Cherches les contradictions dans les arguments", scores: { Se: 2, Sl: 1 } },
      { text: "Restes calme mais défends tes intérêts", scores: { Sl: 2, Se: 1 } },
      { text: "Dis exactement ce que tu penses", scores: { G: 2, Se: 1 } }
    ]
  },
  {
    text: "Dans un escape game, tu…",
    opts: [
      { text: "Prends naturellement la coordination", scores: { Sl: 2, G: 1 } },
      { text: "Touches à tout pour trouver le plus d'indices possible", scores: { G: 2, P: 1 } },
      { text: "Préfères résoudre les énigmes collaborativement", scores: { P: 2, G: 1 } },
      { text: "Te poses contre un mur pour réfléchir aux indices", scores: { Se: 2, Sl: 1 } }
    ]
  },
  {
    text: "On te propose de changer complètement de stack technique. Ta première réaction ?",
    opts: [
      { text: "Ah ça pourrait être une bonne occasion d'apprendre tiens", scores: { G: 2, Se: 1 } },
      { text: "Je regarde si ça nous rapproche ou nous éloigne de nos objectifs", scores: { Sl: 2, Se: 1 } },
      { text: "Je pense direct à la dette qu'on accumule si la transition se passe mal", scores: { P: 2, G: 1 } },
      { text: "Je liste les pour et les contre pour les présenter", scores: { Se: 2, Sl: 1 } }
    ]
  },
  {
    text: "Le compliment que tu préfères dans cette liste :",
    opts: [
      { text: "\"Wah, heureusement que t'étais là !\"", scores: { G: 2, P: 1 } },
      { text: "\"Eh, t'avais grave raison sur ce point en fait !\"", scores: { Se: 2, Sl: 1 } },
      { text: "\"J'aime beaucoup bosser avec toi !\"", scores: { P: 2, G: 1 } },
      { text: "\"Punaise, on aurait pas pu le faire sans toi !\"", scores: { Sl: 2, G: 1 } }
    ]
  },
  {
    text: "Comment tu te comportes quand un projet part dans tous les sens ?",
    opts: [
      { text: "Je m'assure que personne ne se noie et je propose une réunion pour en discuter", scores: { P: 2, Se: 1 } },
      { text: "Je recadre les priorités et je propose une direction claire", scores: { Sl: 2, P: 1 } },
      { text: "Je cherche à comprendre pourquoi on en est là pour trouver la solution la plus pertinente possible", scores: { Se: 2, G: 1 } },
      { text: "Je commence à régler ce qui bloque", scores: { G: 2, Sl: 1 } }
    ]
  },
  {
    text: "Ce qui te fatigue le plus",
    opts: [
      { text: "Le manque de vision ou de compétence", scores: { Sl: 2, Se: 1 } },
      { text: "La routine", scores: { G: 2, Se: 1 } },
      { text: "Les tensions entre les gens", scores: { P: 2, G: 1 } },
      { text: "Les conversations superficielles", scores: { Se: 2, Sl: 1 } }
    ]
  },
  {
    text: "Tu as perdu un match de Quidditch ce weekend",
    opts: [
      { text: "Tu analyses ce qui n’a pas marché pendant des jours", scores: { Se: 2, Sl: 1 } },
      { text: "Tu te demandes surtout si tu as déçu tes coéquipiers", scores: { P: 2, G: 1 } },
      { text: "Tu transformes ça en leçon stratégique pour le prochain match", scores: { Sl: 2, Se: 1 } },
      { text: "Tu rebondis vite même si ça pique", scores: { G: 2, P: 1 } }
    ]
  }
];

const houses = {
  G:  { name: "Gryffondor",  emoji: "🦁", tagline: "L'audacieux·se", desc: "Fonce, réagit vite, prend ses responsabilités, parfois au détriment du recul. Précieux·se dans le chaos." },
  Se: { name: "Serdaigle",   emoji: "🦅", tagline: "L'analytique", desc: "Méthode, rigueur, horreur du flou. A besoin de comprendre avant d'agir. Moteur de qualité." },
  P:  { name: "Poufsouffle", emoji: "🦡", tagline: "Le/La tisserand·e", desc: "Fait tenir le groupe, détecte les tensions, loyal·e. A besoin que l'ambiance soit saine pour être au max." },
  Sl: { name: "Serpentard",  emoji: "🐍", tagline: "Le/La stratège", desc: "Vision long terme, efficacité, sait ce qu'il/elle veut. Peut paraître distant·e mais très fiable quand c'est aligné avec ses valeurs." }
};

let current = -1;
let answers = [];
const shuffled = questions.map(q => ({ ...q, opts: [...q.opts].sort(() => Math.random() - 0.5) }));

function render() {
  const area = document.getElementById('area');
  if (current === -1) {
    area.innerHTML = `<div class="intro"><div class="hat-big">🎩</div><h1 style="font-size:26px;font-weight:700;color:#e2c97e;margin-bottom:0.75rem;">Bienvenue sur le ChoixPro Magique</h1><p>10 questions situationnelles pour découvrir dans quelle maison de Poudlard tu te retrouves au travail.</p><button class="btn-pri" onclick="start()">Commencer le test</button></div>`;
    return;
  }
  if (current >= shuffled.length) { renderResult(area); return; }
  const q = shuffled[current];
  const pct = Math.round((current / shuffled.length) * 100);
  area.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">Question ${current + 1} sur ${shuffled.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">${q.opts.map((o,i) => `<button class="opt${answers[current]===i?' selected':''}" onclick="pick(${i})">${o.text}</button>`).join('')}</div>
    <div class="nav">
      ${current > 0 ? `<button class="btn-sec" onclick="back()">← Retour</button>` : '<span></span>'}
      ${answers[current] !== undefined ? `<button class="btn-pri" onclick="next()">${current === shuffled.length-1 ? 'Voir ma maison ✨' : 'Suivant →'}</button>` : ''}
    </div>`;
}

function renderResult(area) {
  const scores = { G: 0, Se: 0, P: 0, Sl: 0 };
  shuffled.forEach((q, qi) => {
    if (answers[qi] !== undefined) Object.entries(q.opts[answers[qi]].scores).forEach(([h,v]) => { scores[h] += v; });
  });
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const h = houses[winner];
  area.innerHTML = `
    <div class="result-wrap">
      <div class="house-emoji">${h.emoji}</div>
      <div class="house-name">${h.name}</div>
      <div class="house-tagline">${h.tagline}</div>
      <div class="house-desc">${h.desc}</div>
      <div class="scores-detail">Gryffondor ${scores.G} · Serdaigle ${scores.Se} · Poufsouffle ${scores.P} · Serpentard ${scores.Sl}</div>
      <button class="btn-sec" onclick="restart()">Recommencer</button>
    </div>`;
}

function start() { current = 0; render(); }
function pick(i) { answers[current] = i; render(); }
function next() { if (answers[current] !== undefined) { current++; render(); } }
function back() { if (current > 0) { current--; render(); } }
function restart() { current = -1; answers = []; render(); }

render();
</script>
</body>
</html>
